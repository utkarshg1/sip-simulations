<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Monte Carlo SIP Simulator{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">

    <!-- Simulation Loading Overlay -->
    <div id="sim-overlay" aria-live="polite" aria-label="Running simulation">
      <div class="sim-particles">
        <div class="particle">₹</div>
        <div class="particle">%</div>
        <div class="particle">∑</div>
        <div class="particle">₹</div>
        <div class="particle">μ</div>
        <div class="particle">σ</div>
        <div class="particle">∞</div>
        <div class="particle">%</div>
      </div>
      <div class="sim-center">
        <div class="spinner-rings">
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-3"></div>
          <div class="ring-dot"></div>
        </div>
        <div>
          <p id="sim-title-text" class="sim-title">Crunching numbers <span class="dots"><span></span><span></span><span></span></span></p>
          <p id="sim-subtitle-text" class="sim-subtitle">Running 1,00,000 Monte Carlo simulations</p>
        </div>
        <div class="sim-progress-bar">
          <div class="sim-progress-fill"></div>
        </div>
      </div>
    </div>

    <main class="relative min-h-screen overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_left,_rgba(20,184,166,0.22),_transparent_38%),radial-gradient(ellipse_at_bottom_right,_rgba(99,102,241,0.14),_transparent_40%),linear-gradient(135deg,_#020617_0%,_#0f172a_48%,_#134e4a_100%)]"></div>

      <!-- Subtle grid overlay -->
      <div class="absolute inset-0 opacity-[0.025]" style="background-image:linear-gradient(rgba(255,255,255,0.8) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.8) 1px,transparent 1px);background-size:40px 40px"></div>

      <div class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-6 sm:px-8 lg:px-10">
        <!-- Header -->
        <header class="mb-6 flex flex-col gap-3 sm:mb-8 sm:flex-row sm:items-center sm:justify-between">
          <a href="/" class="flex items-center gap-2.5 group">
            <div class="flex h-8 w-8 items-center justify-center rounded-xl bg-teal-500/20 ring-1 ring-teal-400/30 transition group-hover:bg-teal-500/30">
              <svg class="h-5 w-5" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="h" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#14b8a6"/>
                    <stop offset="100%" stop-color="#6366f1"/>
                  </linearGradient>
                  <linearGradient id="hr" x1="0" y1="1" x2="1" y2="0">
                    <stop offset="0%" stop-color="#f43f5e"/>
                    <stop offset="100%" stop-color="#ef4444"/>
                  </linearGradient>
                </defs>
                <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#h)"/>
                <rect x="4.5" y="20" width="3" height="8" rx="1" fill="white" fill-opacity="0.15"/>
                <rect x="9.5" y="15" width="3" height="13" rx="1" fill="white" fill-opacity="0.15"/>
                <rect x="14.5" y="11" width="3" height="17" rx="1" fill="white" fill-opacity="0.15"/>
                <rect x="19.5" y="7" width="3" height="21" rx="1" fill="white" fill-opacity="0.15"/>
                <rect x="24.5" y="3" width="3" height="25" rx="1" fill="white" fill-opacity="0.15"/>
                <path d="M3 26 C10 21 18 16 22 8 C25 4 27 3 28.5 2.5" stroke="url(#hr)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <circle cx="28.5" cy="2.5" r="2" fill="#f43f5e"/>
                <circle cx="28.5" cy="2.5" r="4.5" fill="#f43f5e" opacity="0.2"/>
              </svg>
            </div>
            <span class="text-sm font-bold tracking-tight text-slate-200 group-hover:text-white transition">SIP Simulator</span>
          </a>
          <div class="flex items-center gap-2.5">
            <div class="rounded-full border border-white/10 bg-slate-800 px-3 py-1.5 text-xs font-semibold text-slate-400">
              Monte Carlo · NumPy · FastAPI
            </div>
            <a href="https://github.com/utkarshg1/sip-simulations" target="_blank" rel="noopener noreferrer" class="flex h-8 w-8 items-center justify-center rounded-full border border-white/10 bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white">
              <svg class="h-4 w-4" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
              </svg>
            </a>
            <span class="text-[10px] text-white font-semibold">by Utkarsh Gaikwad</span>
          </div>
        </header>

        {% block content %}{% endblock %}
      </div>
    </main>

    <script>
      window._simOverlay = document.getElementById('sim-overlay');
      window._simTitle = document.getElementById('sim-title-text');
      window._simSubtitle = document.getElementById('sim-subtitle-text');
    </script>
  </body>
</html>
