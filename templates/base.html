<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Monte Carlo SIP Simulator{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="relative min-h-screen overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(20,184,166,0.26),_transparent_32%),linear-gradient(135deg,_#020617_0%,_#111827_42%,_#134e4a_100%)]"></div>
      <div class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col px-5 py-8 sm:px-8 lg:px-10">
        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
